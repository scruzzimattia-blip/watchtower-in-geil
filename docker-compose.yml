services:
  watchtower-in-geil:
    image: ghcr.io/scruzzimattia-blip/watchtower-in-geil:latest
    container_name: watchtower-in-geil
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Hier koennen Umgebungsvariablen konfiguriert werden.
      - POLL_INTERVAL=300
      - WATCH_LABEL=com.watchtower.enable
      - LOG_LEVEL=INFO
      # - WEBHOOK_URL=https://discord.com/api/webhooks/...
      # - DRY_RUN=false
      # - MAX_WORKERS=4
    # Falls das Image privat ist, muss vorher ein 'docker login ghcr.io' erfolgen.
